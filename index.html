<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PDA · GANGSTA DRIVE · COMPACT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0b0f1a;
      font-family: 'Courier New', monospace;
      touch-action: none;
      position: fixed;
      top: 0;
      left: 0;
    }

    .pda {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #1e2636;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      padding: 4px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }

    .screen {
      flex: 1;
      background: #0f121c;
      border-radius: 12px;
      padding: 4px;
      box-shadow: inset 0 0 20px #00000088, 0 0 0 2px #39475e;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 4px;
      border-bottom: 2px solid #2f3d54;
      color: #a3c0e0;
      font-size: 11px;
      letter-spacing: 1px;
      font-weight: bold;
      text-shadow: 0 0 8px #00a6ff60;
      gap: 4px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .status-bar .delta {
      display: flex;
      gap: 2px;
    }

    .status-bar .delta span {
      background: #1d2a3c;
      padding: 1px 4px;
      border-radius: 4px;
      color: #9bc9ff;
      font-size: 9px;
    }

    .timer {
      background: #1d2a3c;
      padding: 1px 6px;
      border-radius: 8px;
      color: #f2c94c;
      font-size: 12px;
      box-shadow: inset 0 0 8px #f2c94c30;
    }

    #gameCanvas {
      flex: 1;
      width: 100%;
      background: #2a3a4a;
      border-radius: 8px;
      display: block;
      margin: 4px 0;
      box-shadow: inset 0 0 30px #000000aa;
      touch-action: none;
      min-height: 0;
      object-fit: contain;
    }

    .footer-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px;
      border-top: 2px solid #2f3d54;
      color: #7a93b0;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      flex-wrap: wrap;
      gap: 4px;
      flex-shrink: 0;
    }

    .footer-panel .left {
      display: flex;
      gap: 4px;
    }

    .footer-panel .left span {
      background: #1d2a3c;
      padding: 2px 6px;
      border-radius: 6px;
      color: #b6d4f0;
      font-size: 10px;
    }

    .footer-panel .kills {
      background: #2a1f2a;
      padding: 2px 8px;
      border-radius: 12px;
      color: #ff6b7a;
      font-size: 12px;
      box-shadow: 0 0 8px #ff3b4a60;
    }

    .sub-mission {
      text-align: center;
      font-size: 9px;
      color: #6b8aaa;
      background: #101724;
      padding: 2px 0;
      border-radius: 12px;
      margin: 2px 0 0;
      letter-spacing: 1px;
      font-weight: bold;
      text-transform: uppercase;
      border: 1px solid #2e405a;
      flex-shrink: 0;
    }

    .sub-mission strong {
      color: #f2c94c;
      font-weight: 900;
    }

    .bottom-buttons {
      display: flex;
      gap: 4px;
      margin: 4px 0 0;
      padding: 0;
      flex-shrink: 0;
    }

    .restart-btn,
    .fullscreen-btn {
      background: #1f2b3d;
      border: 1px solid #3f5470;
      color: #c0d8f0;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 20px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s, background 0.1s;
    }

    .restart-btn {
      flex: 1;
    }

    .restart-btn:active,
    .fullscreen-btn:active {
      background: #2f405a;
      border-color: #7a9bc0;
      transform: scale(0.95);
    }

    .fullscreen-btn {
      background: #1a2a1f;
      border-color: #3a5a3a;
      color: #80ff80;
      min-width: 40px;
      text-align: center;
      font-size: 16px;
      padding: 6px 8px;
      box-shadow: 0 0 8px #44ff4420;
    }

    .fullscreen-btn.active {
      background: #2a3a1a;
      border-color: #6aaa6a;
      color: #ff6644;
    }

    .corner-delta {
      position: absolute;
      color: #3f5777;
      font-size: 9px;
      opacity: 0.3;
      pointer-events: none;
    }

    .top-left {
      top: 12px;
      left: 10px;
    }

    .bottom-right {
      bottom: 12px;
      right: 10px;
    }

    .hp-bar {
      background: #1d2a3c;
      padding: 1px 6px;
      border-radius: 8px;
      color: #ff6b7a;
      font-size: 10px;
    }

    .controls-hint {
      font-size: 8px;
      color: #5a7a9a;
      text-align: center;
      padding: 1px 0;
      letter-spacing: 1px;
      margin-top: -2px;
      flex-shrink: 0;
    }

    .level-display {
      background: #1d2a3c;
      padding: 1px 6px;
      border-radius: 8px;
      color: #9bc9ff;
      font-size: 10px;
    }

    .boss-hp {
      background: #2a1a1a;
      padding: 1px 6px;
      border-radius: 8px;
      color: #ff8844;
      font-size: 10px;
      display: none;
    }

    .boss-hp.active {
      display: inline-block;
    }

    .debug {
      color: #0f0;
      font-size: 9px;
      text-align: center;
      background: #000;
      padding: 2px;
      margin-top: 2px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .touch-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 4px;
      gap: 4px;
      border-top: 1px solid #2f3d54;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .touch-btn {
      background: #1f2b3d;
      border: 1px solid #3f5470;
      color: #c0d8f0;
      font-size: 16px;
      font-weight: bold;
      padding: 6px 8px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      flex: 1;
      text-align: center;
      cursor: pointer;
      touch-action: none;
    }

    .touch-btn:active {
      background: #2f405a;
      transform: scale(0.95);
    }

    .touch-fire {
      background: #2a1f2a;
      border-color: #5a3a3a;
      color: #ff6b7a;
    }

    .touch-fire:active {
      background: #4a2a2a;
    }

    .win-overlay,
    .lose-overlay,
    .start-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 200;
      cursor: pointer;
    }

    .win-overlay {
      background: rgba(0, 0, 0, 0.75);
      pointer-events: auto;
    }

    .win-overlay.show {
      display: flex;
    }

    .win-overlay .main {
      font-family: 'Courier New', monospace;
      font-size: 28px;
      font-weight: 900;
      color: #ffdd00;
      text-shadow: 0 0 20px #ffdd00, 0 0 40px #ff8800;
      letter-spacing: 4px;
      text-align: center;
      animation: winPulse 0.8s infinite alternate;
    }

    .win-overlay .sub {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #fff;
      opacity: 0.8;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    @keyframes winPulse {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.03);
      }
    }

    .lose-overlay {
      background: rgba(139, 0, 0, 0.8);
      pointer-events: auto;
    }

    .lose-overlay.show {
      display: flex;
    }

    .lose-overlay .main {
      font-family: 'Courier New', monospace;
      font-size: 24px;
      font-weight: 900;
      color: #ff2222;
      text-shadow: 0 0 20px #ff0000;
      letter-spacing: 4px;
      text-align: center;
      animation: loseShake 0.12s infinite alternate;
    }

    .lose-overlay .sub {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #ffaaaa;
      margin-top: 8px;
    }

    @keyframes loseShake {
      0% {
        transform: translateX(-2px);
      }
      100% {
        transform: translateX(2px);
      }
    }

    .start-overlay {
      display: flex;
      background: transparent;
      animation: pulse 1s infinite alternate;
      z-index: 100;
    }

    .start-overlay.hidden {
      display: none;
    }

    .start-overlay .main {
      font-family: 'Courier New', monospace;
      font-size: 32px;
      font-weight: 900;
      color: #00ff88;
      text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
    }

    .start-overlay .sub {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #fff;
      margin-top: 4px;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.9;
      }
      100% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    /* === АДАПТИВНЫЕ СТИЛИ === */
    @media (orientation: landscape) {
      .pda {
        padding: 2px;
      }

      .screen {
        padding: 2px;
        border-radius: 8px;
      }

      #gameCanvas {
        margin: 2px 0;
        flex: 1;
      }

      .status-bar {
        padding: 1px 4px;
        font-size: 10px;
      }

      .touch-controls {
        padding: 1px 4px;
        gap: 2px;
        margin-top: 1px;
      }

      .touch-btn {
        padding: 4px 6px;
        font-size: 14px;
        border-radius: 6px;
      }

      .footer-panel {
        padding: 2px 4px;
        font-size: 9px;
      }

      .footer-panel .left span,
      .footer-panel .kills {
        padding: 1px 6px;
        font-size: 9px;
      }

      .sub-mission {
        font-size: 8px;
        padding: 1px 0;
        margin: 1px 0 0;
      }

      .controls-hint {
        font-size: 7px;
        padding: 0;
      }

      .debug {
        font-size: 8px;
        padding: 1px;
        margin-top: 1px;
      }

      .bottom-buttons {
        margin: 2px 0 0;
        gap: 2px;
      }

      .restart-btn,
      .fullscreen-btn {
        padding: 4px 8px;
        font-size: 11px;
        border-radius: 16px;
      }

      .fullscreen-btn {
        font-size: 14px;
        min-width: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="pda">
    <div class="screen">
      <div class="corner-delta top-left">Δ = Δ</div>
      <div class="corner-delta bottom-right">Δ = Δ</div>

      <div class="start-overlay" id="startOverlay">
        <div class="main">СТАРТ</div>
        <div class="sub">нажми на экран</div>
      </div>
      <div class="win-overlay" id="winOverlay">
        <div class="main">🏆 ПОБЕДА!</div>
        <div class="sub">жми РЕСТАРТ</div>
      </div>
      <div class="lose-overlay" id="loseOverlay">
        <div class="main">💀 ПРОВАЛ</div>
        <div class="sub">жми РЕСТАРТ</div>
      </div>

      <div class="status-bar">
        <div class="delta"><span>Δ</span><span>=</span><span>Δ</span></div>
        <div class="timer" id="timerDisplay">⏱️ 03:00</div>
        <div class="level-display" id="levelDisplay">LVL 1</div>
        <div class="hp-bar" id="hpDisplay">❤️ 100</div>
      </div>

      <canvas id="gameCanvas" width="800" height="400"></canvas>

      <div class="touch-controls">
        <button class="touch-btn" id="btnUp">⬆️</button>
        <button class="touch-btn touch-fire" id="btnFire">💥</button>
        <button class="touch-btn" id="btnDown">⬇️</button>
      </div>

      <div class="footer-panel">
        <div class="left">
          <span>🎯</span>
          <span id="killCounter">0/10</span>
        </div>
        <div class="kills" id="enemyCountDisplay">🚗 0/10</div>
        <div class="boss-hp" id="bossHpDisplay">💀 БОСС: 5</div>
      </div>
      <div class="controls-hint">ТАП = ОГОНЬ | ⛶ = ФУЛЛСКРИН</div>
      <div class="sub-mission">
        <span>⚡ цель: <strong>10</strong> тачек ⚡</span>
      </div>
      <div class="debug" id="debugDisplay">⚡ ГОТОВ ⚡</div>

      <div class="bottom-buttons">
        <button class="restart-btn" id="restartBtn">⟳ RESTART</button>
        <button class="fullscreen-btn" id="fullscreenBtn" title="Полный экран">⛶</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const timerDisplay = document.getElementById('timerDisplay');
      const killCounter = document.getElementById('killCounter');
      const enemyCountDisplay = document.getElementById('enemyCountDisplay');
      const hpDisplay = document.getElementById('hpDisplay');
      const levelDisplay = document.getElementById('levelDisplay');
      const bossHpDisplay = document.getElementById('bossHpDisplay');
      const restartBtn = document.getElementById('restartBtn');
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const debugDisplay = document.getElementById('debugDisplay');
      const startOverlay = document.getElementById('startOverlay');
      const winOverlay = document.getElementById('winOverlay');
      const loseOverlay = document.getElementById('loseOverlay');
      const btnUp = document.getElementById('btnUp');
      const btnDown = document.getElementById('btnDown');
      const btnFire = document.getElementById('btnFire');

      // Устанавливаем размеры canvas в соответствии с контейнером
      function resizeCanvas() {
        const container = canvas.parentElement;
        const containerWidth = container.clientWidth - 8; // Учитываем padding screen
        const containerHeight = container.clientHeight;

        // Вычисляем доступное пространство для canvas
        const statusBar = document.querySelector('.status-bar');
        const touchControls = document.querySelector('.touch-controls');
        const footerPanel = document.querySelector('.footer-panel');
        const controlsHint = document.querySelector('.controls-hint');
        const subMission = document.querySelector('.sub-mission');
        const debug = document.querySelector('.debug');
        const bottomButtons = document.querySelector('.bottom-buttons');

        // Вычисляем высоту всех элементов кроме canvas
        let usedHeight = 0;
        if (statusBar) usedHeight += statusBar.offsetHeight;
        if (touchControls) usedHeight += touchControls.offsetHeight;
        if (footerPanel) usedHeight += footerPanel.offsetHeight;
        if (controlsHint) usedHeight += controlsHint.offsetHeight;
        if (subMission) usedHeight += subMission.offsetHeight;
        if (debug) usedHeight += debug.offsetHeight;
        if (bottomButtons) usedHeight += bottomButtons.offsetHeight;

        // Добавляем margin'ы
        usedHeight += 8; // 4px margin сверху и снизу canvas

        const availableHeight = containerHeight - usedHeight;
        const availableWidth = containerWidth;

        if (availableHeight > 0 && availableWidth > 0) {
          // Сохраняем пропорции 2:1 (ширина:высота)
          const aspectRatio = 800 / 400;

          let newWidth = availableWidth;
          let newHeight = newWidth / aspectRatio;

          if (newHeight > availableHeight) {
            newHeight = availableHeight;
            newWidth = newHeight * aspectRatio;
          }

          canvas.style.width = newWidth + 'px';
          canvas.style.height = newHeight + 'px';

          // Обновляем размеры canvas для правильного рендеринга
          if (canvas.width !== newWidth || canvas.height !== newHeight) {
            canvas.width = newWidth;
            canvas.height = newHeight;
          }
        }
      }

      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

      // Начальная установка размеров
      setTimeout(resizeCanvas, 10);

      let isFullscreen = false;

      function enterFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) {
          el.requestFullscreen().catch(() => {});
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        }
        isFullscreen = true;
        fullscreenBtn.textContent = '✕';
        fullscreenBtn.classList.add('active');
      }

      function exitFullscreen() {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
        isFullscreen = false;
        fullscreenBtn.textContent = '⛶';
        fullscreenBtn.classList.remove('active');
      }

      function toggleFullscreen() {
        if (isFullscreen) exitFullscreen();
        else enterFullscreen();
      }

      fullscreenBtn.addEventListener('click', toggleFullscreen);

      function handleFullscreenChange() {
        const fs = document.fullscreenElement || document.webkitFullscreenElement;
        if (!fs && isFullscreen) {
          isFullscreen = false;
          fullscreenBtn.textContent = '⛶';
          fullscreenBtn.classList.remove('active');
          setTimeout(resizeCanvas, 100);
        }
      }
      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'f' || e.key === 'F') toggleFullscreen();
      });

      const GAME_DURATION = 180;
      let timeLeft = GAME_DURATION;
      let kills = 0;
      let gameActive = false;
      let gameOver = false;
      let victory = false;
      let level = 1;
      let bossActive = false;
      let bossDefeated = false;
      let totalEnemiesPerLevel = 10;
      let enemiesSpawned = 0;
      let bossSpawned = false;
      let gameStarted = false;
      let frameCount = 0;
      let lastTime = performance.now();

      const BALANCE = {
        PLAYER_HP: 100,
        ENEMY_HP: 1,
        BOSS_HP: 5,
        ENEMY_BULLET_DMG: 5,
        BOSS_BULLET_DMG: 50,
        PLAYER_BULLET_DMG: 1
      };

      // Используем динамический SCALE на основе размера canvas
      function getScale() {
        return canvas.width / 800;
      }

      const player = {
        x: 80,
        y: canvas.height / 2,
        width: 70,
        height: 38,
        speed: 5,
        hp: BALANCE.PLAYER_HP,
        maxHp: BALANCE.PLAYER_HP,
        shootCooldown: 0,
        shootDelay: 8
      };

      let playerBullets = [];
      let enemies = [];
      const ENEMY_WIDTH = 64;
      const ENEMY_HEIGHT = 32;

      let boss = null;
      const BOSS_WIDTH = 110;
      const BOSS_HEIGHT = 60;

      let enemyBullets = [];
      let upPressed = false;
      let downPressed = false;

      function drawWheel(cx, cy, r, isOffroad) {
        const s = getScale();
        const scaledR = r * s;
        const scaledCx = cx * s;
        const scaledCy = cy * s;

        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(scaledCx, scaledCy, scaledR, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1.5 * s;
        ctx.stroke();

        if (isOffroad) {
          ctx.strokeStyle = '#2a2a2a';
          ctx.lineWidth = 2 * s;
          const treads = 8;
          for (let i = 0; i < treads; i++) {
            const angle = (i / treads) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(scaledCx + Math.cos(angle) * (scaledR - 2 * s), scaledCy + Math.sin(angle) * (scaledR - 2 * s));
            ctx.lineTo(scaledCx + Math.cos(angle) * scaledR, scaledCy + Math.sin(angle) * scaledR);
            ctx.stroke();
          }
        }

        ctx.fillStyle = '#777';
        ctx.beginPath();
        ctx.arc(scaledCx, scaledCy, scaledR * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1 * s;
        ctx.stroke();

        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 1.2 * s;
        const spokes = 4;
        const angleStep = (Math.PI * 2) / spokes;
        const time = frameCount * 0.06;
        for (let i = 0; i < spokes; i++) {
          const angle = i * angleStep + time;
          ctx.beginPath();
          ctx.moveTo(scaledCx, scaledCy);
          ctx.lineTo(scaledCx + Math.cos(angle) * scaledR * 0.5, scaledCy + Math.sin(angle) * scaledR * 0.5);
          ctx.stroke();
        }

        ctx.fillStyle = '#bbb';
        ctx.beginPath();
        ctx.arc(scaledCx, scaledCy, scaledR * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawGunnerOnRoof(cx, roofTop) {
        const s = getScale();
        const scaledCx = cx * s;
        const scaledRoofTop = roofTop * s;
        const gunnerY = scaledRoofTop - 12 * s;

        ctx.fillStyle = '#4a6741';
        ctx.fillRect(scaledCx - 5 * s, gunnerY + 6 * s, 10 * s, 11 * s);
        ctx.fillStyle = '#5a7a4a';
        ctx.fillRect(scaledCx - 4 * s, gunnerY + 8 * s, 8 * s, 4 * s);
        ctx.fillStyle = '#d4b896';
        ctx.beginPath();
        ctx.arc(scaledCx, gunnerY + 3 * s, 5 * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2a3a1a';
        ctx.beginPath();
        ctx.ellipse(scaledCx, gunnerY + 0.5 * s, 6 * s, 3 * s, 0, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(scaledCx - 6 * s, gunnerY - 1 * s, 12 * s, 2 * s);
        ctx.fillStyle = '#111';
        ctx.fillRect(scaledCx - 4 * s, gunnerY + 1.5 * s, 3 * s, 2.5 * s);
        ctx.fillRect(scaledCx + 1 * s, gunnerY + 1.5 * s, 3 * s, 2.5 * s);

        const gunX = scaledCx + 4 * s;
        const gunY = gunnerY + 6 * s;
        ctx.fillStyle = '#333';
        ctx.fillRect(gunX, gunY - 1.5 * s, 14 * s, 2.5 * s);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(gunX, gunY - 1 * s, 6 * s, 2.5 * s);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(gunX + 13 * s, gunY - 2.5 * s, 5 * s, 3 * s);

        if (player.shootCooldown > player.shootDelay - 2) {
          ctx.fillStyle = '#ffdd00';
          ctx.shadowColor = '#ffaa00';
          ctx.shadowBlur = 10 * s;
          ctx.beginPath();
          ctx.moveTo(gunX + 14 * s, gunY);
          ctx.lineTo(gunX + 20 * s + Math.random() * 3 * s, gunY - 2 * s);
          ctx.lineTo(gunX + 20 * s + Math.random() * 3 * s, gunY + 3 * s);
          ctx.lineTo(gunX + 14 * s, gunY + 0.5 * s);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      function drawPlayerJeep() {
        const s = getScale();
        const x = (player.x - 14) * s;
        const y = (player.y - 18) * s;
        const w = player.width * s;
        const h = player.height * s;
        const cx = x + w / 2;

        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(x + 4 * s, y + h - 4 * s, w - 8 * s, 6 * s);

        ctx.fillStyle = '#1a3a1a';
        ctx.shadowColor = '#0066ff';
        ctx.shadowBlur = 22 * s;
        ctx.beginPath();
        ctx.moveTo(x + 6 * s, y + h - 6 * s);
        ctx.lineTo(x + 2 * s, y + h * 0.5);
        ctx.lineTo(x + 4 * s, y + h * 0.3);
        ctx.lineTo(x + w * 0.18, y + 1.5 * s);
        ctx.lineTo(x + w * 0.82, y + 1.5 * s);
        ctx.lineTo(x + w - 4 * s, y + h * 0.3);
        ctx.lineTo(x + w - 2 * s, y + h * 0.5);
        ctx.lineTo(x + w - 6 * s, y + h - 6 * s);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#3a6a3a';
        ctx.lineWidth = 2 * s;
        ctx.stroke();

        ctx.fillStyle = '#2a4a2a';
        ctx.fillRect(x + 8 * s, y + 10 * s, 12 * s, 8 * s);
        ctx.fillRect(x + w - 20 * s, y + 8 * s, 11 * s, 10 * s);

        ctx.fillStyle = '#1a2a3a';
        ctx.beginPath();
        ctx.moveTo(x + w * 0.24, y + 3 * s);
        ctx.lineTo(x + w * 0.76, y + 3 * s);
        ctx.lineTo(x + w * 0.8, y + h * 0.35);
        ctx.lineTo(x + w * 0.2, y + h * 0.35);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#3a6a3a';
        ctx.lineWidth = 1.5 * s;
        ctx.stroke();

        drawGunnerOnRoof(player.x, player.y - 18);

        ctx.fillStyle = '#ffee88';
        ctx.shadowColor = '#ffcc00';
        ctx.shadowBlur = 10 * s;
        ctx.beginPath();
        ctx.arc(x + w - 8 * s, y + h * 0.28, 4.5 * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(x + 1 * s, y + h * 0.32, 4 * s, 6 * s);

        const wheelRadius = h * 0.24;
        const wheelY = y + h - wheelRadius - 2 * s;
        drawWheel(player.x - 14 + player.width * 0.22, player.y - 18 + player.height - wheelRadius / s - 2, wheelRadius / s, true);
        drawWheel(player.x - 14 + player.width * 0.78, player.y - 18 + player.height - wheelRadius / s - 2, wheelRadius / s,
          true);

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${9 * s}px "Courier New", monospace`;
        ctx.textAlign = 'center';
        ctx.fillText('ИГРОК', cx, y - 18 * s);
      }

      function drawEnemyCar(e, index) {
        const s = getScale();
        const colors = [
          { body: '#cc3333', accent: '#ff6666', window: '#331111' },
          { body: '#cc6600', accent: '#ff9933', window: '#332200' },
          { body: '#993399', accent: '#cc66cc', window: '#221133' },
          { body: '#339933', accent: '#66cc66', window: '#113311' },
        ];
        const c = colors[index % colors.length];
        ctx.shadowColor = c.accent;
        ctx.shadowBlur = 10 * s;

        const x = e.x * s;
        const y = e.y * s;
        const w = e.width * s;
        const h = e.height * s;
        const cx = x + w / 2;

        ctx.fillStyle = c.body;
        ctx.beginPath();
        ctx.moveTo(x + 8 * s, y + h - 8 * s);
        ctx.lineTo(x + 4 * s, y + h * 0.45);
        ctx.lineTo(x + w * 0.22, y + 1.5 * s);
        ctx.lineTo(x + w * 0.78, y + 1.5 * s);
        ctx.lineTo(x + w - 4 * s, y + h * 0.45);
        ctx.lineTo(x + w - 8 * s, y + h - 8 * s);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = c.accent;
        ctx.lineWidth = 1.5 * s;
        ctx.stroke();

        ctx.fillStyle = c.window;
        ctx.beginPath();
        ctx.moveTo(x + w * 0.28, y + 3.5 * s);
        ctx.lineTo(x + w * 0.72, y + 3.5 * s);
        ctx.lineTo(x + w * 0.78, y + h * 0.42);
        ctx.lineTo(x + w * 0.22, y + h * 0.42);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffee88';
        ctx.fillRect(x + w - 6 * s, y + h * 0.3, 5 * s, 8 * s);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(x + 1 * s, y + h * 0.3, 5 * s, 8 * s);

        const wheelRadius = h * 0.2;
        const wheelY = y + h - wheelRadius - 2 * s;
        drawWheel(e.x + e.width * 0.25, e.y + e.height - wheelRadius / s - 2, wheelRadius / s, false);
        drawWheel(e.x + e.width * 0.75, e.y + e.height - wheelRadius / s - 2, wheelRadius / s, false);
      }

      function drawBossTank() {
        if (!boss) return;
        const s = getScale();
        const x = boss.x * s;
        const y = boss.y * s;
        const w = BOSS_WIDTH * s;
        const h = BOSS_HEIGHT * s;
        const cx = x + w / 2;

        ctx.shadowColor = '#ff4400';
        ctx.shadowBlur = 30 * s;

        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x + 2 * s, y + h - 15 * s, w - 4 * s, 14 * s);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1.5 * s;
        ctx.strokeRect(x + 2 * s, y + h - 15 * s, w - 4 * s, 14 * s);

        ctx.fillStyle = '#4a5a3a';
        ctx.beginPath();
        ctx.moveTo(x + 8 * s, y + 10 * s);
        ctx.lineTo(x + w - 8 * s, y + 10 * s);
        ctx.lineTo(x + w - 4 * s, y + h - 17 * s);
        ctx.lineTo(x + 4 * s, y + h - 17 * s);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#6a7a5a';
        ctx.lineWidth = 2.5 * s;
        ctx.stroke();

        ctx.fillStyle = '#3a4a2a';
        ctx.beginPath();
        ctx.moveTo(cx - 17 * s, y - 4 * s);
        ctx.lineTo(cx + 17 * s, y - 4 * s);
        ctx.lineTo(cx + 13 * s, y + 8 * s);
        ctx.lineTo(cx - 13 * s, y + 8 * s);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#5a6a4a';
        ctx.lineWidth = 2 * s;
        ctx.stroke();

        ctx.fillStyle = '#555';
        ctx.fillRect(cx - 3 * s, y - 22 * s, 6 * s, 16 * s);
        ctx.fillStyle = '#666';
        ctx.fillRect(cx - 5 * s, y - 26 * s, 10 * s, 6 * s);

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff4444';
        ctx.font = `bold ${10 * s}px "Courier New", monospace`;
        ctx.textAlign = 'center';
        ctx.fillText('ТАНК-БОСС', cx, y - 30 * s);
        ctx.fillText('T-666', cx, y + h - 4 * s);

        ctx.fillStyle = '#ff3344';
        ctx.fillRect(x + 4 * s, y - 35 * s, w - 8 * s, 5 * s);
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(x + 4 * s, y - 35 * s, (boss.hp / boss.maxHp) * (w - 8 * s), 5 * s);
      }

      function triggerGameOver(isVictory) {
        if (gameOver) return;
        gameActive = false;
        gameOver = true;
        victory = isVictory;
        winOverlay.classList.remove('show');
        loseOverlay.classList.remove('show');
        if (isVictory) {
          winOverlay.classList.add('show');
          debugDisplay.textContent = '🏆 ПОБЕДА!';
        } else {
          loseOverlay.classList.add('show');
          debugDisplay.textContent = '💀 ПРОВАЛ';
        }
        upPressed = false;
        downPressed = false;
        updateUI();
      }

      function shootAtNearestEnemy() {
        if (!gameActive || gameOver || player.shootCooldown > 0) return;

        let target = null;
        let minDist = Infinity;

        for (let e of enemies) {
          const dist = Math.hypot(e.x + e.width / 2 - player.x, e.y + e.height / 2 - player.y);
          if (dist < minDist) {
            minDist = dist;
            target = e;
          }
        }

        if (bossActive && boss) {
          const dist = Math.hypot(boss.x + BOSS_WIDTH / 2 - player.x, boss.y + BOSS_HEIGHT / 2 - player.y);
          if (dist < minDist) {
            minDist = dist;
            target = boss;
          }
        }

        if (target) {
          fireBullet(target.x + (target.width || BOSS_WIDTH) / 2, target.y + (target.height || BOSS_HEIGHT) / 2);
        } else {
          fireBullet(player.x + 200, player.y);
        }
      }

      function fireBullet(aimX, aimY) {
        const dx = aimX - player.x;
        const dy = aimY - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 5) return;

        playerBullets.push({
          x: player.x + 40,
          y: player.y - 5,
          vx: (dx / dist) * 10,
          vy: (dy / dist) * 10,
          radius: 5,
          life: 80,
          damage: BALANCE.PLAYER_BULLET_DMG
        });
        player.shootCooldown = player.shootDelay;
      }

      function startGame() {
        if (gameOver) {
          restartGame();
          return;
        }
        startOverlay.classList.add('hidden');
        gameStarted = true;
        gameActive = true;
        lastTime = performance.now();
        debugDisplay.textContent = '🎮 STARTED!';
      }

      btnUp.addEventListener('pointerdown', (e) => {
        upPressed = true;
        if (!gameStarted && !gameOver) startGame();
      });
      btnUp.addEventListener('pointerup', () => { upPressed = false; });
      btnUp.addEventListener('pointerleave', () => { upPressed = false; });
      btnUp.addEventListener('pointercancel', () => { upPressed = false; });

      btnDown.addEventListener('pointerdown', (e) => {
        downPressed = true;
        if (!gameStarted && !gameOver) startGame();
      });
      btnDown.addEventListener('pointerup', () => { downPressed = false; });
      btnDown.addEventListener('pointerleave', () => { downPressed = false; });
      btnDown.addEventListener('pointercancel', () => { downPressed = false; });

      btnFire.addEventListener('pointerdown', (e) => {
        if (!gameStarted && !gameOver) {
          startGame();
          return;
        }
        if (gameOver) {
          restartGame();
          return;
        }
        if (gameActive) shootAtNearestEnemy();
      });

      canvas.addEventListener('pointerdown', function(e) {
        if (!gameStarted && !gameOver) {
          startGame();
          return;
        }
        if (gameOver) {
          restartGame();
          return;
        }
        if (!gameActive) return;

        const rect = canvas.getBoundingClientRect();
        const tapX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const tapY = (e.clientY - rect.top) * (canvas.height / rect.height);

        if (player.shootCooldown <= 0) {
          fireBullet(tapX, tapY);
        }
      });

      function spawnEnemy() {
        if (!gameActive || gameOver || enemiesSpawned >= totalEnemiesPerLevel || bossActive) return;
        const y = 30 + Math.random() * (canvas.height - 60);
        enemies.push({
          x: canvas.width + 20 + Math.random() * 60,
          y: y,
          width: ENEMY_WIDTH,
          height: ENEMY_HEIGHT,
          speed: 1.2 + Math.random() * 1.8,
          hp: BALANCE.ENEMY_HP,
          shootCooldown: 12 + Math.random() * 30,
          shootDelay: 30 + Math.random() * 20
        });
        enemiesSpawned++;
      }

      function initEnemies() {
        enemies = [];
        enemiesSpawned = 0;
        for (let i = 0; i < 8; i++) {
          enemies.push({
            x: canvas.width + 20 + i * 100 + Math.random() * 50,
            y: 30 + Math.random() * (canvas.height - 60),
            width: ENEMY_WIDTH,
            height: ENEMY_HEIGHT,
            speed: 1.0 + Math.random() * 1.8,
            hp: BALANCE.ENEMY_HP,
            shootCooldown: 6 + Math.random() * 35,
            shootDelay: 30 + Math.random() * 20
          });
          enemiesSpawned++;
        }
      }

      function spawnBoss() {
        bossActive = true;
        bossDefeated = false;
        bossSpawned = true;
        boss = {
          x: canvas.width - 60,
          y: canvas.height / 2 - BOSS_HEIGHT / 2,
          width: BOSS_WIDTH,
          height: BOSS_HEIGHT,
          hp: BALANCE.BOSS_HP,
          maxHp: BALANCE.BOSS_HP,
          speed: 1.3,
          direction: 1,
          shootCooldown: 70,
          shootDelay: 70
        };
        bossHpDisplay.classList.add('active');
        bossHpDisplay.textContent = '💀 БОСС: ' + BALANCE.BOSS_HP;
        levelDisplay.textContent = '👹 БОСС';
      }

      function checkLevelComplete() {
        if (gameOver) return false;
        if (bossSpawned && bossDefeated) {
          triggerGameOver(true);
          return true;
        }
        if (!bossActive && !bossSpawned && enemies.length === 0 && enemiesSpawned >= totalEnemiesPerLevel && gameActive) {
          spawnBoss();
          updateUI();
          return true;
        }
        return false;
      }

      function update(currentTime) {
        frameCount++;

        if (!gameStarted || gameOver || !gameActive) {
          lastTime = currentTime;
          return;
        }

        const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.1);
        lastTime = currentTime;

        timeLeft -= deltaTime;
        if (timeLeft <= 0) {
          timeLeft = 0;
          triggerGameOver(false);
          return;
        }

        if (upPressed) {
          player.y -= player.speed;
          if (player.y < 25) player.y = 25;
        }
        if (downPressed) {
          player.y += player.speed;
          if (player.y > canvas.height - 25) player.y = canvas.height - 25;
        }
        if (player.shootCooldown > 0) player.shootCooldown--;

        for (let e of enemies) {
          e.x -= e.speed;
          e.shootCooldown--;
          if (e.shootCooldown <= 0 && e.x < canvas.width - 20 && e.x > 0 && gameActive) {
            const dx = player.x - e.x,
              dy = player.y - e.y;
            const dist = Math.hypot(dx, dy);
            if (dist > 0) {
              enemyBullets.push({
                x: e.x,
                y: e.y + e.height / 2,
                vx: (dx / dist) * 4.5,
                vy: (dy / dist) * 4.5,
                radius: 5,
                life: 120,
                damage: BALANCE.ENEMY_BULLET_DMG,
                isBossBullet: false
              });
              e.shootCooldown = e.shootDelay;
            }
          }
        }
        enemies = enemies.filter(e => e.x > -80);

        if (bossActive && boss) {
          boss.y += boss.speed * boss.direction;
          if (boss.y < 25) {
            boss.y = 25;
            boss.direction = 1;
          }
          if (boss.y + BOSS_HEIGHT > canvas.height - 25) {
            boss.y = canvas.height - 25 - BOSS_HEIGHT;
            boss.direction = -1;
          }

          boss.shootCooldown--;
          if (boss.shootCooldown <= 0 && boss.x > 50 && gameActive) {
            const dx = player.x - boss.x,
              dy = player.y - (boss.y + BOSS_HEIGHT / 2);
            const dist = Math.hypot(dx, dy);
            if (dist > 0) {
              enemyBullets.push({
                x: boss.x,
                y: boss.y + BOSS_HEIGHT / 2,
                vx: (dx / dist) * 4.5,
                vy: (dy / dist) * 4.5,
                radius: 16,
                life: 160,
                damage: BALANCE.BOSS_BULLET_DMG,
                isBossBullet: true
              });
              boss.shootCooldown = boss.shootDelay;
            }
          }
        }

        for (let b of playerBullets) {
          b.x += b.vx;
          b.y += b.vy;
          b.life--;
        }
        playerBullets = playerBullets.filter(b => b.life > 0 && b.x < canvas.width + 30 && b.x > -30);

        for (let i = playerBullets.length - 1; i >= 0; i--) {
          const b = playerBullets[i];
          let hit = false;

          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (b.x > e.x && b.x < e.x + e.width && b.y > e.y && b.y < e.y + e.height) {
              e.hp -= b.damage;
              playerBullets.splice(i, 1);
              hit = true;
              if (e.hp <= 0) {
                enemies.splice(j, 1);
                kills++;
              }
              break;
            }
          }

          if (!hit && bossActive && boss) {
            if (b.x > boss.x && b.x < boss.x + BOSS_WIDTH && b.y > boss.y && b.y < boss.y + BOSS_HEIGHT) {
              boss.hp -= b.damage;
              playerBullets.splice(i, 1);
              hit = true;
              bossHpDisplay.textContent = '💀 БОСС: ' + Math.max(0, boss.hp);
              if (boss.hp <= 0) {
                bossDefeated = true;
                bossActive = false;
                kills += 5;
                bossHpDisplay.classList.remove('active');
                checkLevelComplete();
                updateUI();
                return;
              }
            }
          }
        }

        for (let b of enemyBullets) {
          b.x += b.vx;
          b.y += b.vy;
          b.life--;
        }
        enemyBullets = enemyBullets.filter(b => b.life > 0);

        const px = player.x - 14,
          py = player.y - 18;
        const pw = player.width,
          ph = player.height;

        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          if (b.x > px && b.x < px + pw && b.y > py && b.y < py + ph) {
            player.hp -= b.damage;
            enemyBullets.splice(i, 1);
            if (player.hp <= 0) {
              player.hp = 0;
              triggerGameOver(false);
              return;
            }
          }
        }

        for (let e of enemies) {
          if (e.x < px + pw && e.x + e.width > px && e.y < py + ph && e.y + e.height > py) {
            triggerGameOver(false);
            return;
          }
        }

        if (bossActive && boss) {
          if (boss.x < px + pw && boss.x + BOSS_WIDTH > px && boss.y < py + ph && boss.y + BOSS_HEIGHT > py) {
            triggerGameOver(false);
            return;
          }
        }

        if (!bossActive && !bossSpawned && enemies.length < 8 && enemiesSpawned < totalEnemiesPerLevel && Math.random() <
          0.03) {
          spawnEnemy();
        }

        checkLevelComplete();
        updateUI();
      }

      function updateUI() {
        const mins = Math.floor(Math.max(0, timeLeft) / 60);
        const secs = Math.floor(Math.max(0, timeLeft) % 60);
        timerDisplay.textContent = '⏱️ ' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

        if (bossDefeated) {
          killCounter.textContent = kills + ' ★';
          enemyCountDisplay.textContent = '✅ WIN';
        } else if (bossActive) {
          killCounter.textContent = kills + ' ★';
          enemyCountDisplay.textContent = '💀 BOSS';
        } else {
          killCounter.textContent = kills + '/' + totalEnemiesPerLevel;
          enemyCountDisplay.textContent = '🚗 ' + enemies.length + '/' + totalEnemiesPerLevel;
        }

        hpDisplay.textContent = '❤️ ' + Math.max(0, Math.floor(player.hp));
        if (!bossActive && !bossSpawned) levelDisplay.textContent = 'LVL ' + level;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, '#1a2a3a');
        gradient.addColorStop(0.5, '#2a3a4a');
        gradient.addColorStop(1, '#1a2a3a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.setLineDash([25, 35]);
        ctx.strokeStyle = '#5a7a5a';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
        ctx.setLineDash([]);

        for (let i = 0; i < enemies.length; i++) drawEnemyCar(enemies[i], i);
        if (bossActive && boss) drawBossTank();
        drawPlayerJeep();

        const s = getScale();
        for (let b of playerBullets) {
          ctx.fillStyle = '#ffdd44';
          ctx.shadowColor = '#ffaa00';
          ctx.shadowBlur = 16 * s;
          ctx.beginPath();
          ctx.arc(b.x * s, b.y * s, b.radius * s, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(b.x * s, b.y * s, b.radius * 0.5 * s, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;

        for (let b of enemyBullets) {
          ctx.fillStyle = b.isBossBullet ? '#ff4400' : '#ff6666';
          ctx.shadowColor = b.isBossBullet ? '#ff2200' : '#ff0000';
          ctx.shadowBlur = (b.isBossBullet ? 30 : 12) * s;
          ctx.beginPath();
          ctx.arc(b.x * s, b.y * s, b.radius * s, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }

      function restartGame() {
        timeLeft = GAME_DURATION;
        kills = 0;
        gameActive = false;
        gameOver = false;
        victory = false;
        level = 1;
        bossActive = false;
        bossDefeated = false;
        bossSpawned = false;
        boss = null;
        player.y = canvas.height / 2;
        player.hp = BALANCE.PLAYER_HP;
        player.shootCooldown = 0;
        playerBullets = [];
        enemyBullets = [];
        enemies = [];
        totalEnemiesPerLevel = 10;
        enemiesSpawned = 0;

        bossHpDisplay.classList.remove('active');
        levelDisplay.textContent = 'LVL 1';
        winOverlay.classList.remove('show');
        loseOverlay.classList.remove('show');
        startOverlay.classList.remove('hidden');
        gameStarted = false;
        upPressed = false;
        downPressed = false;

        initEnemies();
        updateUI();
        debugDisplay.textContent = '👆 ТАП ДЛЯ СТАРТА';
      }

      winOverlay.addEventListener('click', restartGame);
      loseOverlay.addEventListener('click', restartGame);
      restartBtn.addEventListener('click', restartGame);
      startOverlay.addEventListener('click', startGame);

      function gameLoop(currentTime) {
        update(currentTime);
        draw();
        requestAnimationFrame(gameLoop);
      }

      initEnemies();
      updateUI();
      // Запускаем игру после того, как canvas будет правильно размещен
      setTimeout(() => {
        resizeCanvas();
        player.y = canvas.height / 2;
        requestAnimationFrame(gameLoop);
      }, 100);
      debugDisplay.textContent = '👆 ТАП ДЛЯ СТАРТА';
    })();
  </script>
</body>
</html>
