<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PDA · WASTELAND SURVIVOR · TOP-DOWN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0a0c10;
      font-family: 'Courier New', monospace;
      touch-action: none;
      position: fixed;
      top: 0;
      left: 0;
    }
    .pda {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #121820;
      box-shadow: 0 10px 30px rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }
    .screen {
      flex: 1;
      background: #0a0f14;
      margin: 4px;
      border-radius: 16px;
      box-shadow: inset 0 0 30px #000000cc, 0 0 0 2px #2a3a4a;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(10, 15, 20, 0.9);
      border-bottom: 2px solid #2a3a4a;
      color: #bcd5f0;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 0 8px #0088ff60;
      z-index: 10;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hp-container {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1f2a;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #3a4a5a;
    }
    .hp-bar-bg {
      width: 120px;
      height: 10px;
      background: #1a0a0a;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #4a2020;
    }
    .hp-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff2244, #ff6644);
      border-radius: 5px;
      transition: width 0.2s;
      box-shadow: 0 0 10px #ff4444;
    }
    .xp-container {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1f2a;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #3a4a5a;
    }
    .xp-bar-bg {
      width: 100px;
      height: 10px;
      background: #0a1a0a;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #2a4a2a;
    }
    .xp-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22cc44, #44ff66);
      border-radius: 5px;
      transition: width 0.2s;
      box-shadow: 0 0 10px #44ff44;
    }
    .wave-display {
      background: #1a1a2a;
      padding: 4px 12px;
      border-radius: 15px;
      border: 1px solid #4a4a6a;
      color: #ccaaff;
      font-size: 14px;
    }
    #gameCanvas {
      flex: 1;
      width: 100%;
      background: radial-gradient(circle, #1a2a3a, #0a0f14);
      display: block;
      touch-action: none;
      cursor: crosshair;
    }
    .hud-bottom {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px;
      background: rgba(10, 15, 20, 0.95);
      border-top: 2px solid #2a3a4a;
      color: #8ab0d0;
      font-size: 11px;
      font-weight: bold;
      z-index: 10;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 6px;
    }
    .weapon-slot {
      background: #1a1f2a;
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid #3a4a5a;
      color: #ffcc44;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .stat-box {
      background: #1a1f2a;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #3a4a5a;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .restart-btn, .fullscreen-btn {
      background: #2a1f1f;
      border: 1px solid #5a3a3a;
      color: #ff8888;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .fullscreen-btn {
      background: #1f2a1f;
      border: 1px solid #3a5a3a;
      color: #88ff88;
    }
    .restart-btn:active, .fullscreen-btn:active {
      background: #4a2a2a;
      transform: scale(0.95);
    }
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 100;
      cursor: pointer;
      background: rgba(0,0,0,0.8);
      pointer-events: auto;
    }
    .overlay.show {
      display: flex;
    }
    .overlay .main {
      font-family: 'Courier New', monospace;
      font-size: 36px;
      font-weight: 900;
      color: #ff4444;
      text-shadow: 0 0 30px #ff0000, 0 0 60px #880000;
      letter-spacing: 4px;
      text-align: center;
      animation: pulse 1s infinite alternate;
    }
    .overlay .sub {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #ccc;
      margin-top: 12px;
      letter-spacing: 2px;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.05); opacity: 1; }
    }
    .level-up-notif {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ffdd00;
      font-size: 24px;
      font-weight: 900;
      text-shadow: 0 0 20px #ffaa00;
      pointer-events: none;
      animation: levelUpAnim 1.5s forwards;
      z-index: 50;
    }
    @keyframes levelUpAnim {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
    }
    
    /* Стили для джойстика */
    .joystick-container {
      position: absolute;
      bottom: 80px;
      left: 20px;
      width: 120px;
      height: 120px;
      z-index: 50;
      display: none;
    }
    
    .joystick-base {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(30, 40, 50, 0.6);
      border: 3px solid rgba(100, 150, 200, 0.4);
      box-shadow: 0 0 20px rgba(0, 100, 200, 0.3), inset 0 0 15px rgba(0, 0, 0, 0.5);
    }
    
    .joystick-stick {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(150, 200, 255, 0.9), rgba(80, 130, 180, 0.8));
      border: 2px solid rgba(200, 230, 255, 0.6);
      box-shadow: 0 0 15px rgba(100, 180, 255, 0.5);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.05s ease-out;
    }
    
    .joystick-container.active {
      display: block;
    }
    
    /* Показываем джойстик только на сенсорных устройствах */
    @media (hover: none) and (pointer: coarse) {
      .joystick-container {
        display: block;
      }
    }
    
    /* Адаптация для горизонтальной ориентации */
    @media (orientation: landscape) {
      .hud-top {
        padding: 6px 10px;
        font-size: 12px;
      }
      
      .hp-bar-bg {
        width: 100px;
      }
      
      .xp-bar-bg {
        width: 80px;
      }
      
      .hud-bottom {
        padding: 6px;
        font-size: 10px;
      }
      
      .joystick-container {
        bottom: 70px;
        left: 15px;
        width: 100px;
        height: 100px;
      }
      
      .joystick-stick {
        width: 40px;
        height: 40px;
      }
    }
    
    /* Адаптация для очень маленьких экранов */
    @media (max-width: 400px) {
      .hud-top {
        padding: 4px 8px;
        font-size: 11px;
      }
      
      .hp-bar-bg {
        width: 80px;
      }
      
      .xp-bar-bg {
        width: 60px;
      }
      
      .hud-bottom {
        padding: 4px;
        font-size: 9px;
      }
      
      .weapon-slot {
        padding: 4px 10px;
        font-size: 11px;
      }
      
      .restart-btn, .fullscreen-btn {
        padding: 6px 12px;
        font-size: 10px;
      }
    }
    
    /* Стили для полноэкранного режима */
    :fullscreen {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    
    :-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    
    :-moz-full-screen {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    
    /* Индикатор ориентации */
    .orientation-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      font-size: 16px;
      text-align: center;
      z-index: 200;
      display: none;
      border: 2px solid #4a5a6a;
    }
    
    .orientation-hint.show {
      display: block;
    }
  </style>
</head>
<body>
<div class="pda">
  <div class="screen" id="screenContainer">
    <div class="overlay" id="deathOverlay">
      <div class="main">💀 УНИЧТОЖЕН</div>
      <div class="sub">Волна: <span id="deathWave">1</span> | Убито: <span id="deathKills">0</span></div>
      <div class="sub" style="margin-top:20px;">ЖМИ ДЛЯ РЕСТАРТА</div>
    </div>
    
    <!-- Индикатор ориентации -->
    <div class="orientation-hint" id="orientationHint">
      🔄 Поверните устройство<br>для лучшего опыта
    </div>
    
    <div class="hud-top">
      <div>⚙️ WASTELAND</div>
      <div class="hp-container">
        <span>❤️</span>
        <div class="hp-bar-bg"><div class="hp-bar-fill" id="hpBarFill"></div></div>
        <span id="hpText">100/100</span>
      </div>
      <div class="xp-container">
        <span>⭐</span>
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBarFill"></div></div>
        <span id="xpText">LVL 1</span>
      </div>
      <div class="wave-display">🌊 ВОЛНА <span id="waveDisplay">1</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Джойстик -->
    <div class="joystick-container" id="joystickContainer">
      <div class="joystick-base"></div>
      <div class="joystick-stick" id="joystickStick"></div>
    </div>

    <div class="hud-bottom">
      <div class="weapon-slot">🔫 <span id="weaponDisplay">ПУЛЕМЁТ</span></div>
      <div class="stat-box">💀 <span id="killCount">0</span></div>
      <div class="stat-box">⏱️ <span id="timerDisplay">0:00</span></div>
      <button class="fullscreen-btn" id="fullscreenBtn">⛶ ПОЛНЫЙ ЭКРАН</button>
      <button class="restart-btn" id="restartBtn">⟳ РЕСТАРТ</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI элементы
    const hpBarFill = document.getElementById('hpBarFill');
    const hpText = document.getElementById('hpText');
    const xpBarFill = document.getElementById('xpBarFill');
    const xpText = document.getElementById('xpText');
    const waveDisplay = document.getElementById('waveDisplay');
    const weaponDisplay = document.getElementById('weaponDisplay');
    const killCount = document.getElementById('killCount');
    const timerDisplay = document.getElementById('timerDisplay');
    const deathOverlay = document.getElementById('deathOverlay');
    const deathWave = document.getElementById('deathWave');
    const deathKills = document.getElementById('deathKills');
    const restartBtn = document.getElementById('restartBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const screenContainer = document.getElementById('screenContainer');
    const joystickContainer = document.getElementById('joystickContainer');
    const joystickStick = document.getElementById('joystickStick');
    const orientationHint = document.getElementById('orientationHint');

    // Состояние игры
    let gameActive = true;
    let gameTime = 0;
    let wave = 1;
    let kills = 0;
    let playerLevel = 1;
    let playerXp = 0;
    let xpToNext = 20;
    
    // Игрок
    const player = {
      x: 400, y: 300,
      radius: 14,
      speed: 4.5,
      hp: 100, maxHp: 100,
      damage: 12,
      fireRate: 8, // кадров между выстрелами
      fireCooldown: 0,
      bulletSpeed: 9,
      bulletSize: 3,
      bulletColor: '#ffdd44',
      bulletCount: 1
    };

    // Массивы объектов
    let enemies = [];
    let bullets = [];
    let pickups = [];
    let particles = [];
    
    // Настройки врагов
    const enemyTypes = {
      basic: { radius: 12, speed: 1.5, hp: 25, color: '#cc3333', xp: 5, damage: 8 },
      fast: { radius: 8, speed: 3.5, hp: 12, color: '#cc6600', xp: 8, damage: 5 },
      tank: { radius: 18, speed: 0.9, hp: 60, color: '#993399', xp: 15, damage: 15 },
      shooter: { radius: 13, speed: 1.2, hp: 30, color: '#3399cc', xp: 12, damage: 6, shoots: true }
    };

    // Ввод
    const keys = {};
    let mouseX = 400, mouseY = 300;
    let mouseDown = false;
    
    // Джойстик
    let joystickActive = false;
    let joystickCenterX = 0;
    let joystickCenterY = 0;
    let joystickDX = 0;
    let joystickDY = 0;
    const joystickMaxRadius = 35;

    // Ресайз канваса
    function resizeCanvas() {
      const rect = screenContainer.getBoundingClientRect();
      const hudTop = document.querySelector('.hud-top');
      const hudBottom = document.querySelector('.hud-bottom');
      const availHeight = rect.height - hudTop.offsetHeight - hudBottom.offsetHeight;
      const availWidth = rect.width;
      
      if (availHeight > 100 && availWidth > 100) {
        canvas.width = availWidth;
        canvas.height = availHeight;
        canvas.style.width = availWidth + 'px';
        canvas.style.height = availHeight + 'px';
        
        // Обновляем позицию джойстика
        updateJoystickPosition();
      }
    }
    
    function updateJoystickPosition() {
      const rect = screenContainer.getBoundingClientRect();
      const isPortrait = window.innerHeight > window.innerWidth;
      
      if (isPortrait) {
        // Вертикальная ориентация
        const baseBottom = 80;
        const baseLeft = 20;
        joystickCenterX = baseLeft + 60;
        joystickCenterY = rect.height - baseBottom - 60;
      } else {
        // Горизонтальная ориентация
        const baseBottom = 70;
        const baseLeft = 15;
        joystickCenterX = baseLeft + 50;
        joystickCenterY = rect.height - baseBottom - 50;
      }
    }

    // Проверка ориентации
    function checkOrientation() {
      const isPortrait = window.innerHeight > window.innerWidth;
      
      if (isPortrait && window.innerWidth < 600) {
        // Показываем подсказку для поворота на маленьких экранах в портретной ориентации
        orientationHint.classList.add('show');
        setTimeout(() => {
          orientationHint.classList.remove('show');
        }, 3000);
      } else {
        orientationHint.classList.remove('show');
      }
      
      resizeCanvas();
    }

    // Полноэкранный режим
    function toggleFullscreen() {
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.mozFullScreenElement) {
        // Вход в полноэкранный режим
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen().catch(err => {
            console.log('Error attempting to enable fullscreen:', err);
          });
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.mozRequestFullScreen) {
          elem.mozRequestFullScreen();
        }
        fullscreenBtn.textContent = '⛶ ОБЫЧНЫЙ ЭКРАН';
      } else {
        // Выход из полноэкранного режима
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        }
        fullscreenBtn.textContent = '⛶ ПОЛНЫЙ ЭКРАН';
      }
    }

    // Обработчик изменения полноэкранного режима
    function handleFullscreenChange() {
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.mozFullScreenElement) {
        fullscreenBtn.textContent = '⛶ ПОЛНЫЙ ЭКРАН';
      } else {
        fullscreenBtn.textContent = '⛶ ОБЫЧНЫЙ ЭКРАН';
      }
      // Пересчитываем размеры после изменения полноэкранного режима
      setTimeout(resizeCanvas, 100);
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        checkOrientation();
        resizeCanvas();
      }, 100);
    });
    
    // Слушатели изменения полноэкранного режима
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    
    // Обработчики ввода
    document.addEventListener('keydown', e => { keys[e.code] = true; });
    document.addEventListener('keyup', e => { keys[e.code] = false; });
    
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
    });
    
    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) mouseDown = true;
      if (!gameActive) restartGame();
    });
    
    canvas.addEventListener('mouseup', e => {
      if (e.button === 0) mouseDown = false;
    });
    
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    
    // Сенсорное управление
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      mouseX = e.touches[0].clientX - rect.left;
      mouseY = e.touches[0].clientY - rect.top;
    });
    
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      mouseDown = true;
      const rect = canvas.getBoundingClientRect();
      mouseX = e.touches[0].clientX - rect.left;
      mouseY = e.touches[0].clientY - rect.top;
      if (!gameActive) restartGame();
    });
    
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      mouseDown = false;
    });

    // Обработчики джойстика
    joystickContainer.addEventListener('touchstart', handleJoystickStart, { passive: false });
    joystickContainer.addEventListener('touchmove', handleJoystickMove, { passive: false });
    joystickContainer.addEventListener('touchend', handleJoystickEnd, { passive: false });
    joystickContainer.addEventListener('touchcancel', handleJoystickEnd, { passive: false });
    
    function handleJoystickStart(e) {
      e.preventDefault();
      e.stopPropagation();
      joystickActive = true;
      updateJoystickPosition();
      handleJoystickMove(e);
    }
    
    function handleJoystickMove(e) {
      e.preventDefault();
      e.stopPropagation();
      
      if (!joystickActive) return;
      
      const touch = e.touches[0];
      const rect = joystickContainer.getBoundingClientRect();
      
      // Позиция касания относительно центра джойстика
      const touchX = touch.clientX - rect.left - 60; // 60 - половина ширины
      const touchY = touch.clientY - rect.top - 60;
      
      // Вычисляем расстояние и угол
      const distance = Math.hypot(touchX, touchY);
      const angle = Math.atan2(touchY, touchX);
      
      // Ограничиваем движение стика максимальным радиусом
      const clampedDistance = Math.min(distance, joystickMaxRadius);
      
      // Новые координаты стика
      const stickX = Math.cos(angle) * clampedDistance;
      const stickY = Math.sin(angle) * clampedDistance;
      
      // Обновляем визуальное положение стика
      joystickStick.style.transform = `translate(calc(-50% + ${stickX}px), calc(-50% + ${stickY}px))`;
      
      // Нормализуем значения для управления (-1 до 1)
      joystickDX = stickX / joystickMaxRadius;
      joystickDY = stickY / joystickMaxRadius;
    }
    
    function handleJoystickEnd(e) {
      e.preventDefault();
      e.stopPropagation();
      joystickActive = false;
      joystickDX = 0;
      joystickDY = 0;
      joystickStick.style.transform = 'translate(-50%, -50%)';
    }

    deathOverlay.addEventListener('click', restartGame);
    restartBtn.addEventListener('click', restartGame);
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    // Спавн врагов
    function spawnEnemy(type) {
      const t = enemyTypes[type];
      let x, y;
      const margin = 40;
      
      // Спавн за краем экрана
      const side = Math.floor(Math.random() * 4);
      switch(side) {
        case 0: x = -margin; y = Math.random() * canvas.height; break;
        case 1: x = canvas.width + margin; y = Math.random() * canvas.height; break;
        case 2: x = Math.random() * canvas.width; y = -margin; break;
        case 3: x = Math.random() * canvas.width; y = canvas.height + margin; break;
      }
      
      enemies.push({
        x, y, radius: t.radius, speed: t.speed + wave * 0.2,
        hp: t.hp + wave * 5, maxHp: t.hp + wave * 5,
        color: t.color, xp: t.xp,
        damage: t.damage + wave,
        type: type,
        shootCooldown: t.shoots ? 60 + Math.random() * 40 : 0,
        shootDelay: t.shoots ? 50 : 0
      });
    }

    function spawnWave() {
      const count = 8 + wave * 3;
      for (let i = 0; i < count; i++) {
        const rand = Math.random();
        if (rand < 0.5) spawnEnemy('basic');
        else if (rand < 0.75) spawnEnemy('fast');
        else if (rand < 0.9) spawnEnemy('tank');
        else spawnEnemy('shooter');
      }
      wave++;
      waveDisplay.textContent = wave;
      
      // Бонус: спавн пикапа
      if (Math.random() < 0.4) {
        pickups.push({
          x: Math.random() * (canvas.width - 80) + 40,
          y: Math.random() * (canvas.height - 80) + 40,
          radius: 10,
          type: Math.random() < 0.5 ? 'heal' : 'xp',
          life: 400
        });
      }
    }

    // Создание частиц
    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 20 + Math.random() * 20,
          color: color,
          radius: 1.5 + Math.random() * 2
        });
      }
    }

    // Проверка волны
    function checkWaveComplete() {
      if (enemies.length === 0 && gameActive) {
        spawnWave();
        showNotification('🌊 ВОЛНА ' + (wave) + '!');
      }
    }

    function showNotification(text) {
      const notif = document.createElement('div');
      notif.className = 'level-up-notif';
      notif.textContent = text;
      screenContainer.appendChild(notif);
      setTimeout(() => notif.remove(), 1500);
    }

    function levelUp() {
      playerLevel++;
      playerXp -= xpToNext;
      xpToNext = Math.floor(xpToNext * 1.5);
      
      // Улучшения при повышении уровня
      player.maxHp += 15;
      player.hp = Math.min(player.hp + 20, player.maxHp);
      player.damage += 3;
      if (playerLevel % 2 === 0) player.bulletCount++;
      if (playerLevel % 3 === 0) player.fireRate = Math.max(4, player.fireRate - 1);
      if (playerLevel % 4 === 0) player.bulletSpeed += 1;
      
      showNotification('⚡ УРОВЕНЬ ' + playerLevel + '!');
      updateUI();
    }

    function updateUI() {
      const hpPercent = (player.hp / player.maxHp) * 100;
      hpBarFill.style.width = hpPercent + '%';
      hpText.textContent = Math.ceil(player.hp) + '/' + player.maxHp;
      
      const xpPercent = (playerXp / xpToNext) * 100;
      xpBarFill.style.width = xpPercent + '%';
      xpText.textContent = 'LVL ' + playerLevel;
      
      weaponDisplay.textContent = player.bulletCount > 1 ? 'ДРОБОВИК' : 'ПУЛЕМЁТ';
      killCount.textContent = kills;
      
      const mins = Math.floor(gameTime / 3600);
      const secs = Math.floor((gameTime % 3600) / 60);
      timerDisplay.textContent = mins + ':' + String(secs).padStart(2, '0');
    }

    function gameOver() {
      gameActive = false;
      deathWave.textContent = wave;
      deathKills.textContent = kills;
      deathOverlay.classList.add('show');
    }

    function restartGame() {
      gameActive = true;
      gameTime = 0;
      wave = 1;
      kills = 0;
      playerLevel = 1;
      playerXp = 0;
      xpToNext = 20;
      
      player.x = canvas.width / 2;
      player.y = canvas.height / 2;
      player.hp = player.maxHp = 100;
      player.damage = 12;
      player.fireRate = 8;
      player.fireCooldown = 0;
      player.bulletSpeed = 9;
      player.bulletCount = 1;
      
      enemies = [];
      bullets = [];
      pickups = [];
      particles = [];
      
      deathOverlay.classList.remove('show');
      waveDisplay.textContent = '1';
      
      spawnWave();
      updateUI();
    }

    // Обновление игры
    function update() {
      if (!gameActive) return;
      
      gameTime++;
      
      // Движение игрока (WASD или стрелки или джойстик)
      let dx = 0, dy = 0;
      
      // Клавиатура
      if (keys['KeyW'] || keys['ArrowUp']) dy = -1;
      if (keys['KeyS'] || keys['ArrowDown']) dy = 1;
      if (keys['KeyA'] || keys['ArrowLeft']) dx = -1;
      if (keys['KeyD'] || keys['ArrowRight']) dx = 1;
      
      // Джойстик (имеет приоритет над клавиатурой)
      if (joystickActive && (Math.abs(joystickDX) > 0.1 || Math.abs(joystickDY) > 0.1)) {
        dx = joystickDX;
        dy = joystickDY;
      }
      
      if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        if (len > 0) {
          dx /= len; 
          dy /= len;
          player.x += dx * player.speed;
          player.y += dy * player.speed;
        }
      }
      
      // Ограничение игрока в пределах экрана
      player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
      player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
      
      // Стрельба
      if (player.fireCooldown > 0) player.fireCooldown--;
      
      if (mouseDown && player.fireCooldown <= 0) {
        player.fireCooldown = player.fireRate;
        
        const aimX = mouseX - player.x;
        const aimY = mouseY - player.y;
        const aimLen = Math.hypot(aimX, aimY);
        
        if (aimLen > 1) {
          const baseAngle = Math.atan2(aimY, aimX);
          const spread = player.bulletCount > 1 ? 0.15 : 0;
          
          for (let i = 0; i < player.bulletCount; i++) {
            const angle = baseAngle + (i - (player.bulletCount - 1) / 2) * spread;
            bullets.push({
              x: player.x, y: player.y,
              vx: Math.cos(angle) * player.bulletSpeed,
              vy: Math.sin(angle) * player.bulletSpeed,
              radius: player.bulletSize,
              damage: player.damage,
              life: 120
            });
          }
        }
      }
      
      // Обновление пуль
      for (let b of bullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
      }
      bullets = bullets.filter(b => b.life > 0 && b.x > -20 && b.x < canvas.width + 20 && b.y > -20 && b.y < canvas.height + 20);
      
      // Обновление врагов
      for (let e of enemies) {
        // Движение к игроку
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 1) {
          e.x += (dx / dist) * e.speed;
          e.y += (dy / dist) * e.speed;
        }
        
        // Враг-стрелок
        if (e.type === 'shooter' && e.shootCooldown !== undefined) {
          e.shootCooldown--;
          if (e.shootCooldown <= 0 && dist < 300) {
            e.shootCooldown = e.shootDelay;
            const bdx = dx / dist * 4;
            const bdy = dy / dist * 4;
            bullets.push({
              x: e.x, y: e.y,
              vx: bdx, vy: bdy,
              radius: 4,
              damage: e.damage,
              life: 100,
              isEnemy: true,
              color: '#ff6666'
            });
          }
        }
        
        // Столкновение с игроком
        if (dist < player.radius + e.radius) {
          player.hp -= e.damage * 0.3;
          spawnParticles(e.x, e.y, '#ff4444', 5);
          if (player.hp <= 0) {
            player.hp = 0;
            spawnParticles(player.x, player.y, '#ffaa00', 30);
            gameOver();
            return;
          }
          
          // Отталкивание врага
          const pushDist = player.radius + e.radius;
          e.x = player.x - (dx / dist) * pushDist;
          e.y = player.y - (dy / dist) * pushDist;
        }
      }
      
      // Попадания пуль
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        let bulletUsed = false;
        
        if (b.isEnemy) {
          // Вражеская пуля попадает в игрока
          const dist = Math.hypot(b.x - player.x, b.y - player.y);
          if (dist < player.radius + b.radius) {
            player.hp -= b.damage;
            spawnParticles(b.x, b.y, '#ff4444', 3);
            bulletUsed = true;
            if (player.hp <= 0) {
              player.hp = 0;
              spawnParticles(player.x, player.y, '#ffaa00', 30);
              gameOver();
              return;
            }
          }
        } else {
          // Пуля игрока попадает во врага
          for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            const dist = Math.hypot(b.x - e.x, b.y - e.y);
            if (dist < e.radius + b.radius) {
              e.hp -= b.damage;
              spawnParticles(b.x, b.y, '#ffcc00', 2);
              bulletUsed = true;
              
              if (e.hp <= 0) {
                playerXp += e.xp;
                kills++;
                spawnParticles(e.x, e.y, e.color, 8);
                
                // Шанс дропа пикапа
                if (Math.random() < 0.15) {
                  pickups.push({
                    x: e.x, y: e.y,
                    radius: 8,
                    type: Math.random() < 0.6 ? 'heal' : 'xp',
                    life: 300
                  });
                }
                
                enemies.splice(j, 1);
              }
              break;
            }
          }
        }
        
        if (bulletUsed) {
          bullets.splice(i, 1);
        }
      }
      
      // Пикапы
      for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        p.life--;
        if (p.life <= 0) {
          pickups.splice(i, 1);
          continue;
        }
        
        const dist = Math.hypot(p.x - player.x, p.y - player.y);
        if (dist < player.radius + p.radius) {
          if (p.type === 'heal') {
            player.hp = Math.min(player.maxHp, player.hp + 25);
            spawnParticles(p.x, p.y, '#44ff44', 8);
          } else {
            playerXp += 15;
            spawnParticles(p.x, p.y, '#ffaa00', 8);
          }
          pickups.splice(i, 1);
        }
      }
      
      // Частицы
      for (let p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
      }
      particles = particles.filter(p => p.life > 0);
      
      // Проверка повышения уровня
      while (playerXp >= xpToNext) {
        levelUp();
      }
      
      checkWaveComplete();
      updateUI();
    }

    // Отрисовка
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Фон с сеткой
      ctx.fillStyle = '#0d1520';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = '#1a2a3a';
      ctx.lineWidth = 0.5;
      const gridSize = 40;
      for (let x = gridSize; x < canvas.width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = gridSize; y < canvas.height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
      
      // Пикапы
      for (let p of pickups) {
        const alpha = 0.5 + Math.sin(gameTime * 0.08 + p.x) * 0.3;
        ctx.fillStyle = p.type === 'heal' ? `rgba(68,255,68,${alpha})` : `rgba(255,170,0,${alpha})`;
        ctx.shadowColor = p.type === 'heal' ? '#44ff44' : '#ffaa00';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius + Math.sin(gameTime * 0.1) * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText(p.type === 'heal' ? '+' : '★', p.x, p.y + 4);
        ctx.shadowBlur = 0;
      }
      
      // Враги
      for (let e of enemies) {
        // Тень
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.arc(e.x + 2, e.y + 2, e.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Тело
        ctx.fillStyle = e.color;
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // HP бар
        if (e.hp < e.maxHp) {
          const barWidth = e.radius * 2;
          const barY = e.y - e.radius - 8;
          ctx.fillStyle = '#333';
          ctx.fillRect(e.x - barWidth/2, barY, barWidth, 3);
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(e.x - barWidth/2, barY, barWidth * (e.hp / e.maxHp), 3);
        }
        
        // Глаза
        const eyeAngle = Math.atan2(player.y - e.y, player.x - e.x);
        ctx.fillStyle = '#fff';
        for (let s = -1; s <= 1; s += 2) {
          ctx.beginPath();
          ctx.arc(e.x + Math.cos(eyeAngle) * 4 + s * 3, e.y + Math.sin(eyeAngle) * 4, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }
      
      // Пули
      for (let b of bullets) {
        ctx.fillStyle = b.isEnemy ? (b.color || '#ff6666') : player.bulletColor;
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      
      // Игрок
      // Подсветка
      ctx.fillStyle = 'rgba(0,100,255,0.3)';
      ctx.shadowColor = '#0066ff';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 6, 0, Math.PI * 2);
      ctx.fill();
      
      // Тело
      ctx.fillStyle = '#2a5a3a';
      ctx.shadowColor = '#00ff44';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#88ffaa';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Пушка (указывает на мышь)
      const aimAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
      ctx.strokeStyle = '#aabbcc';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(player.x, player.y);
      ctx.lineTo(player.x + Math.cos(aimAngle) * (player.radius + 8), 
                 player.y + Math.sin(aimAngle) * (player.radius + 8));
      ctx.stroke();
      
      // Прицел
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(mouseX - 16, mouseY); ctx.lineTo(mouseX + 16, mouseY);
      ctx.moveTo(mouseX, mouseY - 16); ctx.lineTo(mouseX, mouseY + 16);
      ctx.stroke();
      
      // Частицы
      for (let p of particles) {
        const alpha = p.life / 40;
        ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        if (p.color.startsWith('#')) {
          ctx.fillStyle = p.color;
          ctx.globalAlpha = alpha;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Инициализация
    resizeCanvas();
    checkOrientation();
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    spawnWave();
    updateUI();
    gameLoop();
  })();
</script>
