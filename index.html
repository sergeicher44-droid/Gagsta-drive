<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PDA · GANGSTA DRIVE · MOBILE EDITION</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0b0f1a;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
    }
    .pda {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #1e2636;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 0 3px #4c5a72;
      padding: 8px 6px 10px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .screen {
      flex: 1;
      background: #0f121c;
      border-radius: 16px;
      padding: 6px 8px 8px;
      box-shadow: inset 0 0 30px #00000088, 0 0 0 2px #39475e;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .corner-delta {
      position: absolute;
      color: #3f5777;
      font-size: 10px;
      opacity: 0.3;
      pointer-events: none;
    }
    .top-left { top: 18px; left: 14px; }
    .bottom-right { bottom: 18px; right: 14px; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 6px 6px 6px;
      border-bottom: 2px solid #2f3d54;
      color: #a3c0e0;
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: bold;
      text-shadow: 0 0 8px #00a6ff60;
      gap: 4px;
      flex-wrap: wrap;
    }
    .status-bar .delta { display: flex; gap: 4px; }
    .status-bar .delta span {
      background: #1d2a3c;
      padding: 2px 6px;
      border-radius: 6px;
      color: #9bc9ff;
      font-size: 10px;
    }
    .timer {
      background: #1d2a3c;
      padding: 2px 8px;
      border-radius: 10px;
      color: #f2c94c;
      font-size: 14px;
      box-shadow: inset 0 0 12px #f2c94c30;
    }
    #gameCanvas {
      flex: 1;
      width: 100%;
      background: #2a3a4a;
      border-radius: 10px;
      display: block;
      margin: 4px 0;
      box-shadow: inset 0 0 50px #000000aa;
      touch-action: none;
    }

    .touch-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px;
      gap: 6px;
      border-top: 1px solid #2f3d54;
      margin-top: 2px;
    }
    .touch-btn {
      background: #1f2b3d;
      border: 2px solid #3f5470;
      color: #c0d8f0;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 10px;
      border-radius: 12px;
      font-family: 'Courier New', monospace;
      touch-action: manipulation;
      flex: 1;
      text-align: center;
    }
    .touch-btn:active { background: #2f405a; transform: scale(0.93); }
    .touch-fire {
      background: #2a1f2a;
      border-color: #5a3a3a;
      color: #ff6b7a;
    }
    .touch-fire:active { background: #4a2a2a; }

    .footer-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 6px 2px;
      border-top: 2px solid #2f3d54;
      color: #7a93b0;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .footer-panel .left { display: flex; gap: 8px; }
    .footer-panel .left span {
      background: #1d2a3c;
      padding: 2px 8px;
      border-radius: 8px;
      color: #b6d4f0;
      font-size: 11px;
    }
    .footer-panel .kills {
      background: #2a1f2a;
      padding: 2px 12px;
      border-radius: 20px;
      color: #ff6b7a;
      font-size: 14px;
      box-shadow: 0 0 12px #ff3b4a60;
    }
    .boss-hp {
      background: #2a1a1a;
      padding: 2px 10px;
      border-radius: 10px;
      color: #ff8844;
      font-size: 11px;
      display: none;
    }
    .boss-hp.active { display: inline-block; }

    .sub-mission {
      text-align: center;
      font-size: 10px;
      color: #6b8aaa;
      background: #101724;
      padding: 4px 0 3px;
      border-radius: 20px;
      margin: 4px 0 0;
      letter-spacing: 1px;
      font-weight: bold;
      text-transform: uppercase;
      border: 1px solid #2e405a;
    }
    .sub-mission strong { color: #f2c94c; font-weight: 900; }

    .controls-hint {
      font-size: 9px;
      color: #5a7a9a;
      text-align: center;
      padding: 2px 0;
      letter-spacing: 1px;
      margin-top: -2px;
    }
    .debug {
      color: #0f0;
      font-size: 10px;
      text-align: center;
      background: #000;
      padding: 3px;
      margin-top: 2px;
      border-radius: 4px;
    }

    .win-overlay, .lose-overlay, .start-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 200;
    }
    .start-overlay.hidden { display: none; }
    .win-overlay.show { display: flex; }
    .lose-overlay.show { display: flex; }

    .overlay-main {
      font-family: 'Courier New', monospace;
      font-weight: 900;
      letter-spacing: 6px;
      text-align: center;
      text-shadow: 0 0 40px rgba(255,255,255,0.6);
    }
    .win-overlay .overlay-main { font-size: 36px; color: #ffdd00; animation: winPulse 0.8s infinite alternate; }
    .lose-overlay .overlay-main { font-size: 32px; color: #ff2222; animation: loseShake 0.12s infinite alternate; }
    .start-overlay .overlay-main { font-size: 42px; color: #00ff88; animation: pulse 1s infinite alternate; }

    .overlay-sub {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #fff;
      opacity: 0.8;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    @keyframes winPulse { 0% { transform: scale(1); } 100% { transform: scale(1.03); } }
    @keyframes loseShake { 0% { transform: translateX(-3px); } 100% { transform: translateX(3px); } }
    @keyframes pulse { 0% { transform: scale(1) opacity: 0.9; } 100% { transform: scale(1.04) opacity: 1; } }

    .bottom-buttons {
      display: flex;
      gap: 6px;
      margin: 4px 0 0;
      padding: 0 2px;
    }
    .restart-btn, .fullscreen-btn {
      background: #1f2b3d;
      border: 2px solid #3f5470;
      color: #c0d8f0;
      font-size: 14px;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 30px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 2px;
      transition: transform 0.1s, background 0.1s;
    }
    .restart-btn { flex: 1; }
    .restart-btn:active, .fullscreen-btn:active {
      background: #2f405a;
      transform: scale(0.95);
    }
    .fullscreen-btn {
      background: #1a2a1f;
      border-color: #3a5a3a;
      color: #80ff80;
      min-width: 55px;
      text-align: center;
      font-size: 20px;
      padding: 8px 12px;
      box-shadow: 0 0 10px #44ff4420;
    }
    .fullscreen-btn.active {
      background: #2a3a1a;
      border-color: #6aaa6a;
      color: #ff6644;
    }
  </style>
</head>
<body>
<div class="pda">
  <div class="screen">
    <div class="corner-delta top-left">Δ = Δ</div>
    <div class="corner-delta bottom-right">Δ = Δ</div>

    <div class="start-overlay" id="startOverlay">
      <div class="overlay-main">СТАРТ</div>
      <div class="overlay-sub">нажми на экран</div>
    </div>
    <div class="win-overlay" id="winOverlay">
      <div class="overlay-main">🏆 ТЫ ПОБЕДИЛ!</div>
      <div class="overlay-sub">жми РЕСТАРТ</div>
    </div>
    <div class="lose-overlay" id="loseOverlay">
      <div class="overlay-main">💀 ТЫ ПРОИГРАЛ</div>
      <div class="overlay-sub">жми РЕСТАРТ</div>
    </div>

    <div class="status-bar">
      <div class="delta"><span>Δ</span><span>=</span><span>Δ</span></div>
      <div class="timer" id="timerDisplay">⏱️ 03:00</div>
      <div class="level-display" id="levelDisplay">УРОВЕНЬ 1</div>
      <div class="hp-bar" id="hpDisplay">❤️ 100</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="touch-controls">
      <button class="touch-btn" id="btnUp">⬆️ ВВЕРХ</button>
      <button class="touch-btn touch-fire" id="btnFire">💥 ОГОНЬ</button>
      <button class="touch-btn" id="btnDown">⬇️ ВНИЗ</button>
    </div>

    <div class="footer-panel">
      <div class="left">
        <span>🎯</span>
        <span id="killCounter">0/10</span>
      </div>
      <div class="kills" id="enemyCountDisplay">🚗 0/10</div>
      <div class="boss-hp" id="bossHpDisplay">💀 БОСС: 5</div>
    </div>
    <div class="controls-hint">⬆️⬇️ ДВИЖЕНИЕ | 💥 СТРЕЛЬБА | ТАП ПО ЭКРАНУ | ⛶ ФУЛЛСКРИН</div>
    <div class="sub-mission">
      <span>⚡ убей всех врагов за <strong>3</strong> мин ⚡</span>
    </div>
    <div class="debug" id="debugDisplay">⚡ ТАПНИ ПО ЭКРАНУ ⚡</div>
  </div>
  
  <div class="bottom-buttons">
    <button class="restart-btn" id="restartBtn">⟳ РЕСТАРТ</button>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Полноэкранный режим">⛶</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const timerDisplay = document.getElementById('timerDisplay');
  const killCounter = document.getElementById('killCounter');
  const enemyCountDisplay = document.getElementById('enemyCountDisplay');
  const hpDisplay = document.getElementById('hpDisplay');
  const levelDisplay = document.getElementById('levelDisplay');
  const bossHpDisplay = document.getElementById('bossHpDisplay');
  const restartBtn = document.getElementById('restartBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const debugDisplay = document.getElementById('debugDisplay');
  const startOverlay = document.getElementById('startOverlay');
  const winOverlay = document.getElementById('winOverlay');
  const loseOverlay = document.getElementById('loseOverlay');
  const btnUp = document.getElementById('btnUp');
  const btnDown = document.getElementById('btnDown');
  const btnFire = document.getElementById('btnFire');

  // Адаптивный канвас
  function resizeCanvas() {
    const container = canvas.parentElement;
    const maxWidth = container.clientWidth - 16;
